syntax = "proto3";

package biz;
option go_package = "github.com/995933447/mconfigcenter/example/biz";

import "ext.proto";
import "mgormext.proto";

option (ext.proto_gen_opts) = {
  grpc_schema:"mconfigcenter"
  discovery_name:"mconfigcenter"
};

service Biz {
  rpc GetVipMaxLevelLimit(GetVipMaxLevelLimitReq) returns (GetVipMaxLevelLimitResp);
}

message GetVipMaxLevelLimitReq {

}

message GetVipMaxLevelLimitResp {
  int32 level = 1;
}
